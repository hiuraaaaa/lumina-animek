<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AniStream — Nonton Anime Sub Indo</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-logo">ani<span>stream</span></div>
    <div class="topnav-actions">
      <a href="/search" class="icon-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>
      <button class="icon-btn" id="notif-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="icon-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ANNOUNCEMENT -->
  <div class="announcement" id="announcement">
    <div class="announcement-icon">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>
    <div class="announcement-body">
      <div class="announcement-title">ANISTREAM V1 RELEASE</div>
      <div class="announcement-text">Temukan bug? Laporkan ke admin. Selamat menikmati!</div>
    </div>
    <button class="announcement-close" id="close-announce">×</button>
  </div>

  <!-- HERO SLIDER -->
  <section class="hero-slider">
    <div id="hero-slides" class="hero-slides">
      <!-- Diisi JS -->
    </div>
    <div id="hero-counter" class="hero-dots">1/8</div>
    <div id="hero-dot-nav" class="hero-dot-nav">
      <!-- Diisi JS -->
    </div>
  </section>

  <!-- SEARCH BAR -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Cari anime favorit kamu...">
    </div>
  </div>

  <!-- EPISODE TERBARU -->
  <section class="section">
    <div class="section-header">
      <div class="section-title">Episode Terbaru</div>
      <a href="/search" class="section-more">Lihat Semua →</a>
    </div>

    <!-- Filter Chips -->
    <div class="filter-chips">
      <button class="chip active" data-filter="all">Semua</button>
      <button class="chip" data-filter="TV">TV</button>
      <button class="chip" data-filter="Movie">Movie</button>
      <button class="chip" data-filter="Special">Special</button>
      <button class="chip" data-filter="Live Action">Live Action</button>
      <button class="chip" data-filter="OVA">OVA</button>
    </div>

    <!-- Grid -->
    <div id="anime-grid" class="anime-grid">
      <!-- Diisi JS -->
    </div>
  </section>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button id="load-more" class="btn-load-more" style="display:none">
      Muat Lebih Banyak
    </button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      Beranda
    </div>
    <div class="nav-item" onclick="window.location.href='/search?filter=movie'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>
      </svg>
      Genre
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Jadwal
    </div>
    <div class="nav-item" onclick="showToast('Login dulu untuk menyimpan favorit!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Tersimpan
    </div>
    <div class="nav-item" onclick="showToast('Fitur segera hadir!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Lainnya
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="/js/home.js"></script>
</body>
</html>
