<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AniStream — Nonton Anime Sub Indo</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── NO SELECT ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #splash-logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      animation: splashIn 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    #splash-logo span { color: var(--accent2); }
    @keyframes splashIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div id="splash-logo">ani<span>stream</span></div>
  </div>


  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-logo">ani<span>stream</span></div>
    <div class="topnav-actions">
      <button class="icon-btn" id="notif-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ANNOUNCEMENT -->
  <div class="announcement" id="announcement">
    <div class="announcement-icon">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>
    <div class="announcement-body">
      <div class="announcement-title">ANISTREAM V1 RELEASE</div>
      <div class="announcement-text">Temukan bug? Laporkan ke admin. Selamat menikmati!</div>
    </div>
    <button class="announcement-close" id="close-announce">×</button>
  </div>

  <!-- HERO SLIDER -->
  <section class="hero-slider">
    <div id="hero-slides" class="hero-slides"></div>
    <div id="hero-counter" class="hero-dots">1/8</div>
    <div id="hero-dot-nav" class="hero-dot-nav"></div>
  </section>

  <!-- SEARCH BAR -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Cari anime..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <!-- ON-GOING -->
  <section class="section">
    <div class="section-header">
      <div class="section-title">On-Going</div>
      <a href="/ongoing" class="section-more">Lihat Semua</a>
    </div>
    <div id="ongoing-grid" class="anime-grid"></div>
  </section>

  <!-- COMPLETE -->
  <section class="section" style="margin-top:24px">
    <div class="section-header">
      <div class="section-title">Complete</div>
      <a href="/complete" class="section-more">Lihat Semua</a>
    </div>
    <div id="complete-grid" class="anime-grid"></div>
  </section>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" id="nav-genre" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" id="nav-schedule" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" id="nav-watchlist" onclick="window.location.href='/watchlist'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Tersimpan</span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>
  <script src="/js/lazyload.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.lazyLoad?.watchGrid("ongoing-grid");
    });
  </script>

  <script>
    (function() {
      window.hideSplash = function() {
        const splash = document.getElementById('splash');
        if (!splash) return;
        splash.classList.add('fade-out');
        setTimeout(() => splash.remove(), 420);
      };
      // Fallback kalau loadHome hang / error
      setTimeout(window.hideSplash, 5000);
    })();
  </script>
</body>
</html>
