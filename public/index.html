  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #080808;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-logo {
      display: flex; align-items: center; gap: 10px;
      animation: splashIn 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    #splash-logo svg { color: var(--accent2); flex-shrink: 0; }
    #splash-logo .logo-text {
      position: relative; display: flex; align-items: center;
      font-family: 'Outfit', sans-serif;
      font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
    }
    #splash-logo .logo-text .word { position: relative; display: inline-block; }
    #splash-logo .logo-text .word.lunar  { color: var(--text); }
    #splash-logo .logo-text .word.stream { color: var(--accent2); }
    #splash-focus-box {
      position: absolute; border: 1.5px solid var(--accent2);
      pointer-events: none; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); opacity: 0;
    }
    #splash-focus-box::before, #splash-focus-box::after {
      content: ''; position: absolute; width: 8px; height: 8px;
      border-color: var(--accent2); border-style: solid;
    }
    #splash-focus-box::before { top:-3px; left:-3px; border-width: 2px 0 0 2px; }
    #splash-focus-box::after  { bottom:-3px; right:-3px; border-width: 0 2px 2px 0; }

    @keyframes splashIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wordFocus { 0% { filter:blur(4px); opacity:0.4; } 100% { filter:blur(0); opacity:1; } }
    @keyframes wordBlur  { 0% { filter:blur(0);   opacity:1;   } 100% { filter:blur(4px); opacity:0.4; } }

    .topnav-logo { display: flex; align-items: center; gap: 0; }
    .topnav-logo svg { color: var(--accent2); flex-shrink: 0; margin-right: 5px; }

    .home-footer {

    .home-footer-links { display: flex; gap: 12px; }
    .home-footer-link {

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // ── SPLASH ──
    (function() {
      const splashShown = sessionStorage.getItem('splash_shown');
      if (splashShown) {
        document.getElementById('splash')?.remove();
        return;
      }
      sessionStorage.setItem('splash_shown', '1');
      document.body.style.overflow = 'hidden';
      window.hideSplash = function() {
        const splash = document.getElementById('splash');
        if (!splash) return;
        document.body.style.overflow = '';
        splash.classList.add('fade-out');
        setTimeout(() => splash.remove(), 420);
      };
      setTimeout(window.hideSplash, 5000);

      // True focus animation
      const lunar  = document.getElementById('splash-word-lunar');
      const stream = document.getElementById('splash-word-stream');
      const box    = document.getElementById('splash-focus-box');
      if (!lunar || !stream || !box) return;
      function moveFocusBox(target) {
        const rect = target.getBoundingClientRect();
        const pr   = target.closest('.logo-text').getBoundingClientRect();
        box.style.width   = rect.width  + 8 + 'px';
        box.style.height  = rect.height + 6 + 'px';
        box.style.left    = (rect.left - pr.left - 4) + 'px';
        box.style.top     = (rect.top  - pr.top  - 3) + 'px';
        box.style.opacity = '1';
      }
      function focusLunar()  { lunar.style.animation = 'wordFocus 0.4s ease forwards'; stream.style.animation = 'wordBlur 0.4s ease forwards';  moveFocusBox(lunar);  }
      function focusStream() { stream.style.animation = 'wordFocus 0.4s ease forwards'; lunar.style.animation  = 'wordBlur 0.4s ease forwards'; moveFocusBox(stream); }
      setTimeout(() => {
        focusLunar();
        setTimeout(() => focusStream(), 900);
        setTimeout(() => focusLunar(),  1800);
        setTimeout(() => focusStream(), 2700);
      }, 600);
    })();
  </script>

  <script>
    // ── NOTIF BADGE ──
    window.addEventListener('firebase-ready', () => {
      FB.onAuthStateChanged(FB.auth, async (user) => {
        if (!user) return;
        try {
          const { collection, query, orderBy, getDocs, where } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          const q    = query(collection(FB.db, 'notifications', user.uid, 'items'), where('read', '==', false));
          const snap = await getDocs(q);
          const count = snap.size;
          const badge = document.getElementById('notif-badge');
          if (badge && count > 0) {
            badge.textContent   = count > 9 ? '9+' : count;
            badge.style.display = 'flex';
          }
        } catch(e) {}
      });
    });
  </script>
