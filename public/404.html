<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>404 — LunarStream</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-bottom: 0; }
    .wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 40px 24px; text-align: center; max-width: 320px;
    }
    .code {
      font-family: 'Outfit', sans-serif;
      font-size: 72px; font-weight: 800; letter-spacing: -4px;
      color: var(--accent2); line-height: 1;
    }
    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px; font-weight: 800; color: var(--text);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .desc { font-size: 13px; color: var(--text3); line-height: 1.6; }
    .btn-home {
      margin-top: 8px; padding: 12px 28px;
      background: var(--accent); color: white; border: none; border-radius: 0;
      font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 800;
      letter-spacing: 0.8px; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; text-decoration: none;
      display: inline-block;
    }
    .btn-home:active { background: var(--accent3); }
    .divider { width: 32px; height: 2px; background: var(--border2); }
  </style>
</head>
