<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">

  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    .page-header { padding: 18px 18px 4px; }
    .page-header-title { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
    .page-header-title svg { flex-shrink: 0; }
    .page-header-sub { font-size: 11px; color: var(--text3); margin-top: 4px; padding-left: 30px; font-family: 'Outfit', sans-serif; letter-spacing: 0.3px; }

    .day-tabs-wrap { padding: 14px 18px 16px; overflow-x: auto; scrollbar-width: none; }
    #day-tabs { display: flex; gap: 6px; min-width: max-content; }
    .day-tab { position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 14px; border-radius: 0; background: var(--bg2); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; min-width: 62px; }
    .day-tab.active { background: var(--accent); border-color: var(--accent); }
    .day-tab.today:not(.active) { border-color: var(--accent2); }
    .day-tab:active { opacity: 0.8; }
    .day-name { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.3px; text-transform: uppercase; color: var(--text2); }
    .day-tab.active .day-name { color: white; }
    .day-tab.today:not(.active) .day-name { color: var(--accent2); }
    .day-count { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 0; }
    .day-tab.active .day-count { background: rgba(255,255,255,0.2); color: white; }
    .today-dot { position: absolute; top: 5px; right: 5px; width: 4px; height: 4px; border-radius: 50%; background: #22c55e; }
    .day-tab.active .today-dot { background: white; }

    .schedule-header { padding: 0 18px 12px; }
    .schedule-day-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: -0.2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .schedule-day-title::before { content: ''; display: block; width: 3px; height: 16px; background: var(--accent2); border-radius: 0; }
    .schedule-count-label { font-family: 'Outfit', sans-serif; font-size: 10px; color: var(--text3); margin-top: 4px; padding-left: 11px; letter-spacing: 0.5px; }

    #schedule-content { padding: 0 18px; display: flex; flex-direction: column; gap: 1px; }
    .schedule-item { display: flex; align-items: center; gap: 14px; background: var(--bg2); border-bottom: 1px solid var(--border); border-left: 2px solid transparent; padding: 13px 14px; cursor: pointer; transition: all 0.15s; animation: fadeUp 0.3s ease both; -webkit-tap-highlight-color: transparent; }
    .schedule-item:first-child { border-top: 1px solid var(--border); }
    .schedule-item:active { background: var(--bg3); border-left-color: var(--accent2); }

    .schedule-time { flex-shrink: 0; width: 56px; text-align: center; }
    .time-badge { display: inline-block; font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.3px; padding: 3px 7px; border-radius: 0; background: var(--bg3); color: var(--text2); }
    .time-badge.today    { background: rgba(37,99,235,0.15); color: var(--accent2); }
    .time-badge.released { background: rgba(34,197,94,0.12); color: #22c55e; }

    .schedule-info { flex: 1; min-width: 0; }
    .schedule-title { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; line-height: 1.35; letter-spacing: -0.1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .schedule-ep { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'Outfit', sans-serif; letter-spacing: 0.3px; }
    .schedule-arrow { color: var(--text3); flex-shrink: 0; }

    .schedule-skeleton { display: flex; align-items: center; gap: 14px; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 13px 14px; animation: pulse 1.4s ease-in-out infinite; }
    .sk-time { width: 48px; height: 24px; background: var(--bg3); border-radius: 0; flex-shrink: 0; }
    .sk-body { flex: 1; }
    .sk-line { height: 11px; background: var(--bg3); border-radius: 0; margin-bottom: 6px; }
    .sk-line.short { width: 40%; margin-bottom: 0; }
  </style>
</head>
