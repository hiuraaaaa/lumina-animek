<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Jadwal Tayang — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── DAY TABS ── */
    .day-tabs-wrap {
      padding: 0 16px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #day-tabs {
      display: flex;
      gap: 8px;
      min-width: max-content;
    }

    .day-tab {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      min-width: 64px;
    }

    .day-tab.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .day-tab.today:not(.active) {
      border-color: var(--accent2);
    }

    .day-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
    }
    .day-tab.active .day-name { color: white; }
    .day-tab.today:not(.active) .day-name { color: var(--accent2); }

    .day-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 8px;
    }
    .day-tab.active .day-count { background: rgba(255,255,255,0.2); color: white; }

    .today-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
    }
    .day-tab.active .today-dot { background: white; }

    /* ── SECTION HEADER ── */
    .schedule-header {
      padding: 16px 16px 8px;
    }

    .schedule-day-title {
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .schedule-day-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 20px;
      background: var(--accent2);
      border-radius: 2px;
    }

    .schedule-count-label {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
      padding-left: 11px;
    }

    /* ── SCHEDULE LIST ── */
    #schedule-content {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .schedule-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    .schedule-item:active {
      background: var(--bg3);
      transform: scale(0.98);
    }

    .schedule-time {
      flex-shrink: 0;
      width: 60px;
      text-align: center;
    }

    .time-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--bg3);
      color: var(--text2);
    }

    .time-badge.today {
      background: rgba(37,99,235,0.2);
      color: var(--accent2);
    }

    .time-badge.released {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
    }

    .schedule-info {
      flex: 1;
      min-width: 0;
    }

    .schedule-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule-ep {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .schedule-arrow {
      color: var(--text3);
      flex-shrink: 0;
    }

    /* ── SKELETON ── */
    .schedule-skeleton {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      border-radius: 12px;
      padding: 14px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .sk-time {
      width: 52px;
      height: 28px;
      background: var(--bg3);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .sk-body { flex: 1; }

    .sk-line {
      height: 12px;
      background: var(--bg3);
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .sk-line.short { width: 40%; margin-bottom: 0; }
  </style>
</head>

  <script src="/js/utils.js"></script>
