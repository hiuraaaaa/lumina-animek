<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Admin Dashboard — LunarStream</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    body { background: #080808; padding-bottom: 24px; }

    /* ── TOPNAV ── */
    .admin-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: rgba(8,8,8,0.95);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(20px);
    }
    .admin-nav-logo { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; }
    .admin-nav-logo span { color: var(--accent2); }
    .admin-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent2);
      border: 1px solid rgba(96,165,250,0.3);
      padding: 2px 8px; border-radius: 0;
    }
    .btn-logout-nav {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase; color: #fca5a5;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      padding: 6px 12px; cursor: pointer; transition: all 0.15s;
    }
    .btn-logout-nav:active { background: rgba(239,68,68,0.15); }

    /* ── SECTION ── */
    .admin-section { padding: 20px 18px 0; }
    .admin-section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 800; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .admin-section-title::before {
      content: ''; width: 3px; height: 13px;
      background: var(--accent2); border-radius: 0;
    }

    /* ── STAT CARDS ── */
    .stat-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 16px; border-radius: 0;
      border-left: 2px solid var(--border);
      transition: border-color 0.15s;
    }
    .stat-card.blue   { border-left-color: var(--accent2); }
    .stat-card.green  { border-left-color: #22c55e; }
    .stat-card.purple { border-left-color: #a855f7; }
    .stat-card.yellow { border-left-color: #fbbf24; }

    .stat-card-label {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .stat-card-value {
      font-family: 'Outfit', sans-serif;
      font-size: 28px; font-weight: 800; color: var(--text);
      line-height: 1;
    }
    .stat-card-sub {
      font-size: 10px; color: var(--text3); margin-top: 4px;
      font-family: 'Outfit', sans-serif;
    }

    /* ── TABLE ── */
    .admin-table {
      width: 100%; border-collapse: collapse;
    }
    .admin-table th {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 800; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .admin-table td {
      padding: 11px 12px; font-size: 12px; color: var(--text2);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:active td { background: var(--bg3); }

    .user-avatar-sm {
      width: 28px; height: 28px; border-radius: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 800; color: white;
      flex-shrink: 0; vertical-align: middle; margin-right: 8px;
    }
    .user-name { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); }
    .user-email { font-size: 10px; color: var(--text3); margin-top: 1px; }

    .badge-active {
      font-family: 'Outfit', sans-serif;
      font-size: 8px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase; padding: 2px 7px;
      background: rgba(34,197,94,0.12); color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2); border-radius: 0;
    }
    .badge-inactive {
      font-family: 'Outfit', sans-serif;
      font-size: 8px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase; padding: 2px 7px;
      background: var(--bg3); color: var(--text3);
      border: 1px solid var(--border); border-radius: 0;
    }

    /* ── ACTION BUTTONS ── */
    .btn-action {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase; padding: 4px 10px;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text2); cursor: pointer; transition: all 0.15s;
    }
    .btn-action:active { background: var(--bg4); }
    .btn-action.danger { color: #fca5a5; border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }

    /* ── POPULAR LIST ── */
    .popular-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .popular-item:first-child { border-top: 1px solid var(--border); }
    .popular-rank {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 800; color: var(--text3);
      width: 20px; text-align: center; flex-shrink: 0;
    }
    .popular-rank.top { color: var(--accent2); }
    .popular-title {
      flex: 1; font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .popular-count {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 700; color: var(--text3);
      flex-shrink: 0;
    }

    /* ── USER DETAIL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
      overscroll-behavior: none; touch-action: none;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      width: 100%; max-width: 480px; background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 20px 20px 40px;
      display: flex; flex-direction: column; gap: 14px;
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
      max-height: 80vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 3px; background: var(--bg4); margin: 0 auto -4px; }
    .modal-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3px; }

    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; }
    .detail-row-value { color: var(--text2); font-size: 12px; text-align: right; max-width: 60%; }

    /* ── SPINNER ── */
    .spinner { width: 24px; height: 24px; border: 2px solid var(--bg3); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 20px auto; }

    /* ── SKELETON ── */
    .sk-line { height: 10px; background: var(--bg3); border-radius: 0; animation: pulse 1.4s ease-in-out infinite; margin-bottom: 6px; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="admin-nav">
    <div>
      <div class="admin-nav-logo" style="display:flex;align-items:center;gap:5px"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="var(--accent2)" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>Lunar<span>Stream</span></div>
    </div>
    <div class="admin-badge">Admin</div>
    <button class="btn-logout-nav" onclick="doLogout()">Keluar</button>
  </nav>

  <!-- LOADING STATE -->
  <div id="page-loading" style="display:flex;align-items:center;justify-content:center;height:60vh">
    <div class="spinner" style="width:32px;height:32px"></div>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div id="dashboard" style="display:none">

    <!-- MONITORING -->
    <div class="admin-section">
      <div class="admin-section-title">Monitoring</div>
      <div class="stat-grid">
        <div class="stat-card blue">
          <div class="stat-card-label">Total User</div>
          <div class="stat-card-value" id="stat-users">–</div>
          <div class="stat-card-sub">Terdaftar</div>
        </div>
        <div class="stat-card green">
          <div class="stat-card-label">Episode Ditonton</div>
          <div class="stat-card-value" id="stat-watched">–</div>
          <div class="stat-card-sub">Total semua user</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-card-label">Watchlist</div>
          <div class="stat-card-value" id="stat-watchlist">–</div>
          <div class="stat-card-sub">Total tersimpan</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-card-label">User Aktif</div>
          <div class="stat-card-value" id="stat-active">–</div>
          <div class="stat-card-sub">Punya history</div>
        </div>
      </div>
    </div>

    <!-- ANIME POPULER -->
    <div class="admin-section">
      <div class="admin-section-title">Anime Terpopuler</div>
      <div id="popular-list">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- ANNOUNCEMENT -->
    <div class="admin-section">
      <div class="admin-section-title">Announcement</div>
      <div style="background:var(--bg2);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px">
        <!-- Toggle aktif/nonaktif -->
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text)">Tampilkan Announcement</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">Muncul di halaman beranda</div>
          </div>
          <div id="ann-toggle" onclick="toggleAnnouncement()" style="width:40px;height:22px;border-radius:11px;background:var(--bg4);position:relative;transition:background 0.2s;cursor:pointer;flex-shrink:0">
            <div id="ann-knob" style="position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:transform 0.2s"></div>
          </div>
        </div>
        <!-- Form -->
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Judul</label>
            <input type="text" id="ann-title" placeholder="Judul announcement..."
              style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;transition:border-color 0.15s"
              onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Teks</label>
            <textarea id="ann-text" rows="2" placeholder="Isi pesan announcement..."
              style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;resize:none;transition:border-color 0.15s"
              onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'"></textarea>
          </div>
          <button onclick="saveAnnouncement()" id="btn-save-ann"
            style="width:100%;padding:11px;background:var(--accent);color:white;border:none;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;transition:all 0.15s">
            Simpan
          </button>
        </div>
      </div>
    </div>

    <!-- KIRIM NOTIFIKASI -->
    <div class="admin-section">
      <div class="admin-section-title">Kirim Notifikasi</div>
      <div style="background:var(--bg2);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Target</label>
          <select id="notif-target" onchange="toggleNotifUid()"
            style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;appearance:none">
            <option value="all">Semua User</option>
            <option value="user">User Tertentu</option>
          </select>
        </div>
        <div id="notif-uid-wrap" style="display:none;flex-direction:column;gap:4px">
          <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">UID User</label>
          <input type="text" id="notif-uid" placeholder="UID user target..."
            style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%"
            onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Judul</label>
          <input type="text" id="notif-title" placeholder="Judul notifikasi..."
            style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%"
            onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Pesan</label>
          <textarea id="notif-message" rows="2" placeholder="Isi pesan notifikasi..."
            style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;resize:none"
            onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'"></textarea>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Tipe</label>
          <select id="notif-type"
            style="background:var(--bg3);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;appearance:none">
            <option value="info">Info</option>
            <option value="success">Success</option>
            <option value="warning">Warning</option>
            <option value="anime">Anime Baru</option>
          </select>
        </div>
        <button onclick="sendNotification()" id="btn-send-notif"
          style="width:100%;padding:11px;background:var(--accent);color:white;border:none;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;transition:all 0.15s">
          Kirim Notifikasi
        </button>
      </div>
    </div>

    <!-- MANAJEMEN USER -->
    <div class="admin-section" style="padding-bottom:24px">
      <div class="admin-section-title" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          <span style="width:3px;height:13px;background:var(--accent2);display:inline-block"></span>
          Manajemen User
        </span>
        <span id="user-count" style="font-family:'Outfit',sans-serif;font-size:10px;color:var(--text3);font-weight:700"></span>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);overflow:hidden">
        <div id="user-table-wrap">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- USER DETAIL MODAL -->
  <div class="modal-overlay" id="user-modal" onclick="closeModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-username">Detail User</div>
      <div id="modal-body"></div>
      <button class="btn-action danger" id="btn-ban" onclick="banUser()" style="width:100%;padding:12px">
        Ban User
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/firebase.js"></script>
  <script>
    let currentAdminUser = null;
    let allUsers = [];
    let selectedUser = null;

    // ── AUTH CHECK ──
    window.addEventListener('firebase-ready', () => {
      FB.onAuthStateChanged(FB.auth, async (user) => {
        if (!user) { window.location.href = '/admin/login'; return; }
        const res  = await fetch('/api/admin/check', { headers: { 'x-user-email': user.email } });
        const data = await res.json();
        if (!data.isAdmin) { await FB.signOut(FB.auth); window.location.href = '/admin/login'; return; }
        currentAdminUser = user;
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('dashboard').style.display    = 'block';
        loadDashboard();
      });
    });

    // ── LOAD DASHBOARD ──
    async function loadDashboard() {
      await Promise.all([loadStats(), loadUsers(), loadAnnouncement()]);
    }

    async function loadStats() {
      try {
        const res  = await fetch('/api/admin/stats', { headers: { 'x-user-email': currentAdminUser.email } });
        const data = await res.json();
        if (!data.status) return;
        const s = data.stats;
        document.getElementById('stat-users').textContent     = s.totalUsers || 0;
        document.getElementById('stat-watched').textContent   = s.totalWatched || 0;
        document.getElementById('stat-watchlist').textContent = s.totalWatchlist || 0;
        document.getElementById('stat-active').textContent    = s.activeUsers || 0;
        renderPopular(s.popularAnime || []);
      } catch(e) { showToast('Gagal load stats'); }
    }

    function renderPopular(list) {
      const wrap = document.getElementById('popular-list');
      if (!list.length) { wrap.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">Belum ada data</div>'; return; }
      wrap.innerHTML = list.slice(0, 10).map((item, i) => `
        <div class="popular-item">
          <span class="popular-rank ${i < 3 ? 'top' : ''}">${i + 1}</span>
          <span class="popular-title">${escHtml(item.title)}</span>
          <span class="popular-count">${item.count}x</span>
        </div>
      `).join('');
    }

    async function loadUsers() {
      try {
        const res  = await fetch('/api/admin/users', { headers: { 'x-user-email': currentAdminUser.email } });
        const data = await res.json();
        if (!data.status) return;
        allUsers = data.users || [];
        document.getElementById('user-count').textContent = allUsers.length + ' user';
        renderUserTable(allUsers);
      } catch(e) { showToast('Gagal load users'); }
    }

    function renderUserTable(users) {
      const wrap = document.getElementById('user-table-wrap');
      if (!users.length) { wrap.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">Tidak ada user</div>'; return; }
      wrap.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Ditonton</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>
                  <div style="display:flex;align-items:center">
                    <span class="user-avatar-sm">${(u.displayName || u.email || '?')[0].toUpperCase()}</span>
                    <div>
                      <div class="user-name">${escHtml(u.displayName || 'Anon')}</div>
                      <div class="user-email">${escHtml(u.email || '')}</div>
                    </div>
                  </div>
                </td>
                <td style="font-family:'Outfit',sans-serif;font-weight:700">${u.watchedCount || 0}</td>
                <td><span class="${u.banned ? 'badge-inactive' : 'badge-active'}">${u.banned ? 'Banned' : 'Aktif'}</span></td>
                <td><button class="btn-action" onclick="showUserDetail('${u.uid}')">Detail</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showUserDetail(uid) {
      selectedUser = allUsers.find(u => u.uid === uid);
      if (!selectedUser) return;
      const u = selectedUser;
      document.getElementById('modal-username').textContent = u.displayName || 'Anon';
      // fix: handle berbagai format createdAt dari Firestore
      let joinDate = '–';
      if (u.createdAt) {
        if (u.createdAt.seconds) {
          // Firestore Timestamp serialized
          joinDate = new Date(u.createdAt.seconds * 1000).toLocaleDateString('id-ID');
        } else if (u.createdAt._seconds) {
          joinDate = new Date(u.createdAt._seconds * 1000).toLocaleDateString('id-ID');
        } else if (typeof u.createdAt === 'string' || typeof u.createdAt === 'number') {
          joinDate = new Date(u.createdAt).toLocaleDateString('id-ID');
        }
      }
      document.getElementById('modal-body').innerHTML = `
        <div class="detail-row"><span class="detail-row-label">Email</span><span class="detail-row-value">${escHtml(u.email || '–')}</span></div>
        <div class="detail-row"><span class="detail-row-label">UID</span><span class="detail-row-value" style="font-size:10px;word-break:break-all">${u.uid}</span></div>
        <div class="detail-row"><span class="detail-row-label">Bergabung</span><span class="detail-row-value">${joinDate}</span></div>
        <div class="detail-row"><span class="detail-row-label">Episode Ditonton</span><span class="detail-row-value">${u.watchedCount || 0}</span></div>
        <div class="detail-row"><span class="detail-row-label">Watchlist</span><span class="detail-row-value">${u.watchlist?.length || 0} anime</span></div>
        <div class="detail-row"><span class="detail-row-label">Status</span><span class="detail-row-value"><span class="${u.banned ? 'badge-inactive' : 'badge-active'}">${u.banned ? 'Banned' : 'Aktif'}</span></span></div>
        <div class="detail-row"><span class="detail-row-label">Bio</span><span class="detail-row-value">${escHtml(u.bio || '–')}</span></div>
      `;
      const banBtn = document.getElementById('btn-ban');
      banBtn.textContent = u.banned ? 'Unban User' : 'Ban User';
      banBtn.className   = u.banned ? 'btn-action' : 'btn-action danger';
      banBtn.style.width = '100%'; banBtn.style.padding = '12px';
      document.body.style.overflow = 'hidden';
      document.body.style.position = 'fixed';
      document.body.style.width    = '100%';
      document.getElementById('user-modal').classList.add('show');
    }

    async function banUser() {
      if (!selectedUser) return;
      const newBanned = !selectedUser.banned;
      const confirmMsg = newBanned ? `Ban ${selectedUser.displayName || selectedUser.email}?` : `Unban ${selectedUser.displayName || selectedUser.email}?`;
      if (!confirm(confirmMsg)) return;
      try {
        await FB.updateUserProfile(selectedUser.uid, { banned: newBanned });
        selectedUser.banned = newBanned;
        allUsers = allUsers.map(u => u.uid === selectedUser.uid ? { ...u, banned: newBanned } : u);
        renderUserTable(allUsers);
        closeModal({ target: null });
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width    = '';
        showToast(newBanned ? 'User berhasil dibanned' : 'User berhasil diunban');
      } catch(e) { showToast('Gagal: ' + e.message); }
    }

    function closeModal(e) {
      if (!e.target || e.target === document.getElementById('user-modal')) {
        document.getElementById('user-modal').classList.remove('show');
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width    = '';
      }
    }

    // ── ANNOUNCEMENT ──
    let _annActive = false;

    async function loadAnnouncement() {
      try {
        const res  = await fetch('/api/admin/announcement', { headers: { 'x-user-email': currentAdminUser.email } });
        const data = await res.json();
        if (!data.status) return;
        const ann = data.announcement;
        _annActive = ann.active || false;
        document.getElementById('ann-title').value = ann.title || '';
        document.getElementById('ann-text').value  = ann.text  || '';
        updateAnnToggle(_annActive);
      } catch(e) {}
    }

    function updateAnnToggle(active) {
      _annActive = active;
      const toggle = document.getElementById('ann-toggle');
      const knob   = document.getElementById('ann-knob');
      toggle.style.background = active ? 'var(--accent)' : 'var(--bg4)';
      knob.style.transform    = active ? 'translateX(18px)' : 'translateX(0)';
    }

    async function toggleAnnouncement() {
      updateAnnToggle(!_annActive);
    }

    async function saveAnnouncement() {
      const title  = document.getElementById('ann-title').value.trim();
      const text   = document.getElementById('ann-text').value.trim();
      const btn    = document.getElementById('btn-save-ann');
      btn.disabled = true; btn.textContent = 'Menyimpan...';
      try {
        const res = await fetch('/api/admin/announcement', {
          method:  'POST',
          headers: { 'x-user-email': currentAdminUser.email, 'Content-Type': 'application/json' },
          body:    JSON.stringify({ title, text, active: _annActive })
        });
        const data = await res.json();
        if (data.status) showToast('Announcement disimpan!');
        else showToast('Gagal: ' + data.message);
      } catch(e) { showToast('Gagal: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = 'Simpan'; }
    }

    // ── NOTIFICATIONS ──
    function toggleNotifUid() {
      const target = document.getElementById('notif-target').value;
      const wrap   = document.getElementById('notif-uid-wrap');
      wrap.style.display = target === 'user' ? 'flex' : 'none';
    }

    async function sendNotification() {
      const target  = document.getElementById('notif-target').value;
      const uid     = document.getElementById('notif-uid').value.trim();
      const title   = document.getElementById('notif-title').value.trim();
      const message = document.getElementById('notif-message').value.trim();
      const type    = document.getElementById('notif-type').value;

      if (!title)   return showToast('Judul wajib diisi');
      if (!message) return showToast('Pesan wajib diisi');
      if (target === 'user' && !uid) return showToast('UID user wajib diisi');

      const btn = document.getElementById('btn-send-notif');
      btn.disabled = true; btn.textContent = 'Mengirim...';

      try {
        const res = await fetch('/api/admin/notifications/send', {
          method:  'POST',
          headers: { 'x-user-email': currentAdminUser.email, 'Content-Type': 'application/json' },
          body:    JSON.stringify({ target, uid: target === 'user' ? uid : undefined, title, message, type })
        });
        const data = await res.json();
        if (data.status) {
          showToast(data.message || 'Notif terkirim!');
          document.getElementById('notif-title').value   = '';
          document.getElementById('notif-message').value = '';
        } else {
          showToast('Gagal: ' + data.message);
        }
      } catch(e) { showToast('Gagal: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = 'Kirim Notifikasi'; }
    }

    async function doLogout() {
      await FB.signOut(FB.auth);
      window.location.href = '/admin/login';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
