<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Notifikasi — LunarStream</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }

    .page-header { padding: 18px 18px 4px; }
    .page-header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-header-sub {
      font-size: 11px; color: var(--text3);
      margin-top: 4px; padding-left: 28px;
      font-family: 'Outfit', sans-serif;
    }

    .notif-list { margin-top: 12px; }

    .notif-item {
      display: flex; gap: 14px; padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid transparent;
      animation: fadeUp 0.3s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    .notif-item:first-child { border-top: 1px solid var(--border); }
    .notif-item.unread { background: var(--bg2); border-left-color: var(--accent2); }

    .notif-icon {
      width: 36px; height: 36px; border-radius: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .notif-icon.info    { background: rgba(124,58,237,0.12); color: var(--accent2); }
    .notif-icon.success { background: rgba(34,197,94,0.1);  color: #22c55e; }
    .notif-icon.warning { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .notif-icon.anime   { background: rgba(168,85,247,0.1); color: #a855f7; }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .notif-item.unread .notif-title { color: var(--text); }
    .notif-message {
      font-size: 12px; color: var(--text3);
      margin-top: 3px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .notif-time {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; color: var(--text3);
      margin-top: 5px;
    }

    .notif-unread-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2); flex-shrink: 0; margin-top: 5px;
    }

    .btn-mark-all {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 800; color: var(--accent2);
      background: none; border: none; cursor: pointer; padding: 0;
      letter-spacing: 0.3px;
    }

    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--bg3); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>

  <nav class="topnav">
    <button class="icon-btn" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" style="color:var(--accent2);margin-right:5px;flex-shrink:0" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>Lunar<span>Stream</span>
    </div>
    <div style="width:38px"></div>
  </nav>

  <div class="page-header">
    <div class="page-header-title">
      <svg width="18" height="18" fill="none" stroke="var(--accent2)" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      Notifikasi
    </div>
    <div class="page-header-sub" id="notif-sub">Memuat...</div>
  </div>

  <!-- LOADING -->
  <div id="page-loading" style="display:flex;align-items:center;justify-content:center;height:40vh">
    <div class="spinner"></div>
  </div>

  <!-- CONTENT -->
  <div id="page-content" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0">
      <div style="font-family:'Outfit',sans-serif;font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px" id="notif-count"></div>
      <button class="btn-mark-all" id="btn-mark-all" onclick="markAllRead()" style="display:none">Tandai Semua Dibaca</button>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/list'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>List</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/firebase.js"></script>
  <script>
    let currentUser = null;
    let notifList   = [];

    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(diff / 86400000);
      if (m < 1)  return 'Baru saja';
      if (m < 60) return `${m} menit lalu`;
      if (h < 24) return `${h} jam lalu`;
      if (d < 7)  return `${d} hari lalu`;
      return new Date(ts).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
    }

    function getNotifIcon(type) {
      const icons = {
        info:    `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        success: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
        warning: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        anime:   `<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`,
      };
      return icons[type] || icons.info;
    }

    function renderNotifs(list) {
      const wrap     = document.getElementById('notif-list');
      const countEl  = document.getElementById('notif-count');
      const markBtn  = document.getElementById('btn-mark-all');
      const subEl    = document.getElementById('notif-sub');
      const unread   = list.filter(n => !n.read).length;

      subEl.textContent   = `${list.length} notifikasi`;
      countEl.textContent = unread ? `${unread} belum dibaca` : 'Semua sudah dibaca';
      markBtn.style.display = unread ? 'block' : 'none';

      if (!list.length) {
        wrap.innerHTML = `<div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <h3>Belum Ada Notifikasi</h3>
          <p>Notifikasi dari admin akan muncul di sini</p>
        </div>`;
        return;
      }

      wrap.innerHTML = list.map((n, i) => `
        <div class="notif-item ${n.read ? '' : 'unread'}" style="animation-delay:${i * 30}ms" onclick="markRead('${n.id}', ${i})">
          <div class="notif-icon ${n.type || 'info'}">${getNotifIcon(n.type || 'info')}</div>
          <div class="notif-body">
            <div class="notif-title">${escHtml(n.title || '')}</div>
            <div class="notif-message">${escHtml(n.message || '')}</div>
            <div class="notif-time">${timeAgo(n.sentAt?.seconds ? n.sentAt.seconds * 1000 : n.sentAt)}</div>
          </div>
          ${!n.read ? '<div class="notif-unread-dot"></div>' : ''}
        </div>
      `).join('');
    }

    async function markRead(notifId, index) {
      if (notifList[index]?.read) return;
      await FB.markNotifRead(currentUser.uid, notifId);
      notifList[index].read = true;
      renderNotifs(notifList);
    }

    async function markAllRead() {
      try {
        await FB.markAllNotifsRead(currentUser.uid);
        notifList = notifList.map(n => ({ ...n, read: true }));
        renderNotifs(notifList);
        showToast('Semua notifikasi ditandai dibaca');
      } catch(e) { showToast('Gagal: ' + e.message); }
    }

    window.addEventListener('firebase-ready', () => {
      FB.onAuthStateChanged(FB.auth, async (user) => {
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('page-content').style.display = 'block';

        if (!user) {
          document.getElementById('notif-list').innerHTML = `<div class="empty-state">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <h3>Belum Login</h3>
            <p>Login untuk melihat notifikasi</p>
            <button onclick="window.location.href='/login'"
              style="margin-top:12px;padding:10px 24px;background:var(--accent);color:white;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer">
              Login
            </button>
          </div>`;
          document.getElementById('notif-sub').textContent = '';
          return;
        }

        currentUser = user;

        try {
          notifList = await FB.getNotifications(user.uid);
          renderNotifs(notifList);
        } catch(e) {
          document.getElementById('notif-sub').textContent = 'Gagal memuat';
        }
      });
    });
  </script>
</body>
</html>
