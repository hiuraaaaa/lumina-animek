<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Browse — LunarStream</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    .page-header { padding: 18px 18px 4px; }
    .page-header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-header-sub {
      font-size: 11px; color: var(--text3);
      margin-top: 4px; padding-left: 28px;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.3px;
    }

    .result-info {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .result-title {
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .result-title::before {
      content: ''; width: 3px; height: 13px;
      background: var(--accent2); border-radius: 0;
    }
    .result-count {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; color: var(--text3); font-weight: 700;
    }

    #browse-grid {
      padding: 0 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .load-more-wrap { padding: 16px 18px; }
    #load-more {
      width: 100%; padding: 13px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text2); cursor: pointer; display: none;
      transition: all 0.15s;
    }
    #load-more:active { background: var(--bg3); color: var(--text); }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <button class="icon-btn" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" style="color:var(--accent2);margin-right:5px;flex-shrink:0" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>Lunar<span>Stream</span></div>
    <div style="width:38px"></div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-title" id="page-title">
      <svg width="18" height="18" fill="none" stroke="var(--accent2)" stroke-width="2" viewBox="0 0 24 24" id="page-icon"></svg>
      <span id="page-title-text">Memuat...</span>
    </div>
    <div class="page-header-sub" id="page-sub"></div>
  </div>

  <!-- RESULT INFO -->
  <div class="result-info">
    <div class="result-title" id="result-title"></div>
    <div class="result-count" id="result-count"></div>
  </div>

  <!-- GRID -->
  <div id="browse-grid"></div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button id="load-more" onclick="loadMore()">Muat Lebih Banyak</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/list'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>List</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script>
    const TYPE     = window.location.pathname.includes('complete') ? 'complete' : 'ongoing';
    const API_URL  = TYPE === 'complete' ? '/api/anime/completed' : '/api/anime/ongoing';
    let   page     = 1;
    let   isLoading = false;
    let   totalPages = 1;

    // Setup page header
    const titles = {
      ongoing:  { title: 'On-Going',  sub: 'Anime yang sedang tayang' },
      complete: { title: 'Complete',  sub: 'Anime yang sudah selesai' },
    };
    const t = titles[TYPE];
    document.title = `${t.title} — LunarStream`;
    document.getElementById('page-title-text').textContent = t.title;
    document.getElementById('page-sub').textContent        = t.sub;
    document.getElementById('result-title').textContent    = t.title;

    // Icons
    const icons = {
      ongoing:  `<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>`,
      complete: `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
    };
    document.getElementById('page-icon').innerHTML = icons[TYPE];

    async function loadPage(p = 1) {
      if (isLoading) return;
      isLoading = true;
      const grid = document.getElementById('browse-grid');
      if (p === 1) grid.innerHTML = renderSkeleton(9);

      try {
        const data  = await fetchJSON(`${API_URL}?page=${p}`);
        const items = data.anime_list || [];
        totalPages  = data.total_pages || 1;

        if (p === 1) grid.innerHTML = '';
        items.forEach((a, i) => {
          grid.insertAdjacentHTML('beforeend', renderCard(a, i));
        });

        document.getElementById('result-count').textContent = `Halaman ${p}/${totalPages}`;
        const btn = document.getElementById('load-more');
        btn.style.display = p < totalPages ? 'block' : 'none';
        page = p;

      } catch(e) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <h3>Gagal Memuat</h3><p>${e.message}</p>
        </div>`;
        showToast('Gagal memuat');
      } finally {
        isLoading = false;
      }
    }

    function loadMore() { loadPage(page + 1); }

    document.addEventListener('DOMContentLoaded', () => loadPage(1));
  </script>
  <script src="/js/lazyload.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => window.lazyLoad?.watchGrid("browse-grid"));</script>
</body>
</html>
