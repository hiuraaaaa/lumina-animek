<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hubungi Kami — LunarStream</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    body { display: flex; flex-direction: column; height: 100vh; padding-bottom: 0; overflow: hidden; }

    /* ── HERO ── */
    .chat-hero {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 0; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-info { flex: 1; }
    .chat-name {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 800; color: var(--text);
    }
    .chat-status {
      font-size: 10px; color: #22c55e;
      font-family: 'Outfit', sans-serif; font-weight: 600;
      display: flex; align-items: center; gap: 5px; margin-top: 1px;
    }
    .chat-status::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: #22c55e;
      flex-shrink: 0;
    }

    /* ── MESSAGES ── */
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: none;
    }

    .msg-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .msg-wrap.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 800; color: white;
    }
    .msg-avatar.user-av { background: var(--bg3); color: var(--text2); }

    .msg-bubble {
      max-width: 75%; padding: 10px 13px;
      font-size: 13px; line-height: 1.6; border-radius: 0;
    }
    .msg-bubble.bot {
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text2); border-bottom-left-radius: 0;
    }
    .msg-bubble.user {
      background: var(--accent); color: white;
      border-bottom-right-radius: 0;
    }
    .msg-time {
      font-size: 9px; color: var(--text3);
      font-family: 'Outfit', sans-serif;
      margin-top: 3px; text-align: right;
    }
    .msg-wrap.user .msg-time { text-align: left; }

    /* ── TYPING ── */
    .typing-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .typing-bubble {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 12px 16px; display: flex; gap: 4px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── QUICK REPLIES ── */
    .quick-replies {
      padding: 0 16px 10px;
      display: flex; gap: 6px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .quick-btn {
      padding: 6px 12px; border-radius: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 700;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .quick-btn:active { background: rgba(37,99,235,0.1); border-color: var(--accent2); color: var(--accent2); }

    /* ── INPUT ── */
    .chat-input-wrap {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    #chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0; padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none; resize: none;
      max-height: 100px; line-height: 1.5;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: var(--accent2); }
    #chat-input::placeholder { color: var(--text3); }
    #btn-send {
      width: 42px; height: 42px;
      background: var(--accent); border: none; border-radius: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
      color: white;
    }
    #btn-send:active { background: #1d4ed8; }
    #btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav" style="flex-shrink:0">
    <button class="icon-btn" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" style="color:var(--accent2);margin-right:5px;flex-shrink:0" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>Lunar<span>Stream</span></div>
    <div style="width:38px"></div>
  </nav>

  <!-- CHAT HERO -->
  <div class="chat-hero">
    <div class="chat-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>
    </div>
    <div class="chat-info">
      <div class="chat-name">Lunar AI</div>
      <div class="chat-status">Online — Siap membantu</div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="chat-messages">
    <div class="msg-wrap">
      <div class="chat-avatar msg-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>
      </div>
      <div>
        <div class="msg-bubble bot">Halo! Aku Lunar, asisten AI LunarStream 🌙<br>Ada yang bisa aku bantu? Tanya apa aja soal LunarStream, anime, atau hal lainnya!</div>
        <div class="msg-time">sekarang</div>
      </div>
    </div>
  </div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quick-replies">
    <button class="quick-btn" onclick="sendQuick('Cara daftar akun?')">Cara daftar?</button>
    <button class="quick-btn" onclick="sendQuick('Kenapa video tidak bisa diputar?')">Video error</button>
    <button class="quick-btn" onclick="sendQuick('Cara menyimpan anime ke watchlist?')">Cara watchlist?</button>
    <button class="quick-btn" onclick="sendQuick('Apakah LunarStream gratis?')">Gratis?</button>
  </div>

  <!-- INPUT -->
  <div class="chat-input-wrap">
    <textarea id="chat-input" rows="1" placeholder="Tulis pesan..." autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <button id="btn-send" onclick="sendMessage()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script>
    const SYSTEM = 'Kamu adalah Lunar, asisten AI resmi LunarStream — platform streaming anime subtitle Indonesia. Bantu pengguna dengan pertanyaan seputar LunarStream, anime, cara penggunaan fitur, dan masalah teknis. Gunakan bahasa yang santai, ramah, dan relevan dengan gaya bicara pengguna. Jawab dengan singkat dan jelas.';
    const API    = 'https://api-lumina-ashy.vercel.app/ai-chat/custom';

    let isWaiting = false;

    const input   = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');
    const msgs    = document.getElementById('chat-messages');

    // Auto resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    // Enter to send (Shift+Enter = newline)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function getTime() {
      return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }

    function appendMsg(text, type) {
      const isUser = type === 'user';
      const wrap   = document.createElement('div');
      wrap.className = 'msg-wrap' + (isUser ? ' user' : '');
      wrap.innerHTML = isUser
        ? `<div>
            <div class="msg-bubble user">${escHtml(text)}</div>
            <div class="msg-time">${getTime()}</div>
          </div>
          <div class="msg-avatar user-av">K</div>`
        : `<div class="chat-avatar msg-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>
          </div>
          <div>
            <div class="msg-bubble bot">${text.replace(/\n/g, '<br>')}</div>
            <div class="msg-time">${getTime()}</div>
          </div>`;
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
      return wrap;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'typing-wrap'; wrap.id = 'typing-indicator';
      wrap.innerHTML = `
        <div class="chat-avatar msg-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>
        </div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() {
      document.getElementById('typing-indicator')?.remove();
    }

    async function sendMessage(text) {
      const q = (text || input.value).trim();
      if (!q || isWaiting) return;

      // Hide quick replies after first message
      document.getElementById('quick-replies').style.display = 'none';

      appendMsg(q, 'user');
      input.value = ''; input.style.height = 'auto';
      isWaiting = true; btnSend.disabled = true;
      showTyping();

      try {
        const url  = `${API}?query=${encodeURIComponent(q)}&system=${encodeURIComponent(SYSTEM)}&model=gpt-5.2-nano`;
        const res  = await fetch(url);
        const data = await res.json();
        hideTyping();
        const reply = data.result || 'Maaf, aku tidak bisa menjawab saat ini. Coba lagi nanti!';
        appendMsg(reply, 'bot');
      } catch(e) {
        hideTyping();
        appendMsg('Koneksi bermasalah. Coba lagi nanti ya!', 'bot');
      } finally {
        isWaiting = false; btnSend.disabled = false;
        input.focus();
      }
    }

    function sendQuick(text) { sendMessage(text); }
  </script>
</body>
</html>
