<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Watchlist — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    #watchlist-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 16px;
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <button class="icon-btn" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="15,18 9,12 15,6"/>
      </svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'">ani<span>stream</span></div>
    <div style="width:38px"></div>
  </nav>

  <div class="section-header" style="padding: 8px 16px 16px">
    <div class="section-title">Watchlist</div>
    <div id="wl-count" style="font-size:12px;color:var(--text3)"></div>
  </div>

  <div id="watchlist-grid">
    <div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:40vh">
      <div style="width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item active" onclick="window.location.href='/watchlist'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Tersimpan</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/firebase.js"></script>
  <script>
    window.addEventListener('firebase-ready', () => {
      FB.onAuthStateChanged(FB.auth, async (user) => {
        const grid = document.getElementById('watchlist-grid');
        if (!user) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
            <h3>Belum Login</h3>
            <p>Login dulu untuk melihat watchlist</p>
            <button onclick="window.location.href='/login'"
              style="margin-top:12px;padding:10px 24px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">
              Login
            </button>
          </div>`;
          return;
        }

        const profile = await FB.getUserProfile(user.uid);
        const list    = profile?.watchlist || [];

        document.getElementById('wl-count').textContent = list.length ? `${list.length} anime` : '';

        if (!list.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
            <h3>Watchlist Kosong</h3>
            <p>Simpan anime favoritmu dari halaman detail</p>
          </div>`;
          return;
        }

        grid.innerHTML = list.map(a => renderCard(a)).join('');
      });
    });
  </script>
</body>
</html>
