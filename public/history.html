<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Riwayat Tonton — LunarStream</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    .history-item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp 0.3s ease both;
    }
    .history-item:first-child { border-top: 1px solid var(--border); }
    .history-item:active { background: var(--bg2); border-left-color: var(--accent2); }

    .history-icon {
      width: 36px; height: 36px; border-radius: 0; flex-shrink: 0;
      background: rgba(124,58,237,0.1);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent2);
    }

    .history-info { flex: 1; min-width: 0; }
    .history-title {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-series {
      font-size: 11px; color: var(--text3);
      margin-top: 2px; font-family: 'Outfit', sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-time {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; color: var(--text3);
      flex-shrink: 0; text-align: right;
    }

    .page-header { padding: 18px 18px 4px; }
    .page-header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-header-sub {
      font-size: 11px; color: var(--text3);
      margin-top: 4px; padding-left: 28px;
      font-family: 'Outfit', sans-serif;
    }

    .result-info {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .result-title {
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .result-title::before { content: ''; width: 3px; height: 13px; background: var(--accent2); }

    .btn-clear {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase; color: #fca5a5;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      padding: 5px 12px; cursor: pointer; transition: all 0.15s;
    }
    .btn-clear:active { background: rgba(239,68,68,0.15); }

    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--bg3); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>

  <nav class="topnav">
    <button class="icon-btn" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" style="color:var(--accent2);margin-right:5px;flex-shrink:0" viewBox="0 0 256 256"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"></path></svg>Lunar<span>Stream</span></div>
    <div style="width:38px"></div>
  </nav>

  <div class="page-header">
    <div class="page-header-title">
      <svg width="18" height="18" fill="none" stroke="var(--accent2)" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
      </svg>
      Riwayat Tonton
    </div>
    <div class="page-header-sub" id="page-sub">Memuat...</div>
  </div>

  <!-- LOADING -->
  <div id="page-loading" style="display:flex;align-items:center;justify-content:center;height:40vh">
    <div class="spinner"></div>
  </div>

  <!-- CONTENT -->
  <div id="page-content" style="display:none">
    <div class="result-info">
      <div class="result-title">Riwayat</div>
      <button class="btn-clear" id="btn-clear" onclick="clearHistory()">Hapus Semua</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/list'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>List</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/firebase.js"></script>
  <script>
    let currentUser = null;

    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(diff / 86400000);
      if (m < 1)  return 'Baru saja';
      if (m < 60) return `${m} menit lalu`;
      if (h < 24) return `${h} jam lalu`;
      if (d < 7)  return `${d} hari lalu`;
      return new Date(ts).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
    }

    function renderHistory(list) {
      const wrap = document.getElementById('history-list');
      if (!list.length) {
        wrap.innerHTML = `<div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
          </svg>
          <h3>Belum Ada Riwayat</h3>
          <p>Anime yang kamu tonton akan muncul di sini</p>
        </div>`;
        document.getElementById('btn-clear').style.display = 'none';
        document.getElementById('page-sub').textContent = '0 episode ditonton';
        return;
      }

      document.getElementById('page-sub').textContent = `${list.length} episode ditonton`;
      document.getElementById('btn-clear').style.display = 'block';

      // Sort by watchedAt descending
      const sorted = [...list].sort((a, b) => (b.watchedAt || 0) - (a.watchedAt || 0));

      wrap.innerHTML = sorted.map((ep, i) => {
        const slug       = ep.slug || '';
        const title      = ep.title || 'Episode';
        const seriesName = ep.seriesName || '';
        const watchedAt  = ep.watchedAt || 0;
        return `<div class="history-item" style="animation-delay:${i * 20}ms"
          onclick="window.location.href='/watch?slug=${escHtml(slug)}'">
          <div class="history-icon">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <div class="history-info">
            <div class="history-title">${escHtml(title)}</div>
            ${seriesName ? `<div class="history-series">${escHtml(seriesName)}</div>` : ''}
          </div>
          <div class="history-time">${timeAgo(watchedAt)}</div>
        </div>`;
      }).join('');
    }

    async function clearHistory() {
      if (!confirm('Hapus semua riwayat tonton?')) return;
      try {
        await FB.updateUserProfile(currentUser.uid, { watchHistory: [], watchedCount: 0 });
        renderHistory([]);
        showToast('Riwayat berhasil dihapus');
      } catch(e) {
        showToast('Gagal: ' + e.message);
      }
    }

    window.addEventListener('firebase-ready', () => {
      FB.onAuthStateChanged(FB.auth, async (user) => {
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('page-content').style.display = 'block';

        if (!user) {
          document.getElementById('history-list').innerHTML = `<div class="empty-state">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <h3>Belum Login</h3>
            <p>Login dulu untuk melihat riwayat tonton</p>
            <button onclick="window.location.href='/login'"
              style="margin-top:12px;padding:10px 24px;background:var(--accent);color:white;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer">
              Login
            </button>
          </div>`;
          document.getElementById('btn-clear').style.display = 'none';
          document.getElementById('page-sub').textContent = '';
          return;
        }

        currentUser = user;
        const profile = await FB.getUserProfile(user.uid);
        renderHistory(profile?.watchHistory || []);
      });
    });
  </script>
</body>
</html>
