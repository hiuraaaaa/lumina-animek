<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Genre — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    /* ── FILTER SECTION ── */
    .filter-section { padding: 0 18px 14px; }
    .filter-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 800;
      color: var(--text3);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 8px;
    }

    /* ── STATUS TABS ── */
    .status-tabs { display: flex; gap: 6px; margin-bottom: 0; }
    .status-tab {
      flex: 1; padding: 10px;
      border-radius: 0;
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.3px; text-transform: uppercase;
      color: var(--text2); background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .status-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
    .status-tab:active { opacity: 0.8; }

    /* ── GENRE PILLS ── */
    .genre-pills-wrap { padding: 0 18px 16px; }
    #genre-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .genre-pill {
      padding: 6px 13px; border-radius: 0;
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.3px; text-transform: uppercase;
      color: var(--text2); background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
    }
    .genre-pill.active {
      background: rgba(37,99,235,0.12);
      border-color: var(--accent2); color: var(--accent2);
    }
    .genre-pill:active { opacity: 0.7; }

    /* ── RESULT HEADER ── */
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px 14px;
    }
    #genre-page-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.3px;
      display: flex; align-items: center; gap: 8px;
    }
    #genre-page-title::before {
      content: ''; width: 3px; height: 14px;
      background: var(--accent2); border-radius: 0;
    }
    #result-count {
      font-family: 'Syne', sans-serif;
      font-size: 10px; color: var(--text3);
      font-weight: 700; letter-spacing: 0.3px;
    }

    /* ── GRID ── */
    #genre-grid {
      padding: 0 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    /* ── LOAD MORE ── */
    .load-more-wrap { padding: 16px 18px; }
    #load-more {
      width: 100%; padding: 13px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0;
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text2); cursor: pointer; display: none;
      transition: all 0.15s;
    }
    #load-more:active { background: var(--bg3); color: var(--text); }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-logo" onclick="window.location.href='/'">ani<span>stream</span></div>
    <div class="topnav-actions">
      <a href="/search" class="icon-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>
    </div>
  </nav>

  <!-- STATUS FILTER -->
  <div class="filter-section">
    <div class="filter-label">Status</div>
    <div class="status-tabs">
      <button class="status-tab" data-status="ongoing"   onclick="setStatus('ongoing')">Ongoing</button>
      <button class="status-tab" data-status="completed" onclick="setStatus('completed')">Completed</button>
    </div>
  </div>

  <!-- GENRE PILLS -->
  <div class="genre-pills-wrap">
    <div class="filter-label" style="margin-bottom:10px">Genre</div>
    <div id="genre-chips"></div>
  </div>

  <!-- RESULT HEADER -->
  <div class="result-header">
    <div id="genre-page-title">Semua Anime</div>
    <div id="result-count"></div>
  </div>

  <!-- GRID -->
  <div id="genre-grid"></div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button id="load-more">Muat Lebih Banyak</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item active" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/list'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>ListAnime</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/genre.js"></script>
  <script src="/js/lazyload.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => window.lazyLoad?.watchGrid("genre-grid"));</script>
</body>
</html>
