<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Genre — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── FILTER SECTION ── */
    .filter-section {
      padding: 0 16px 16px;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    /* ── STATUS TABS ── */
    .status-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .status-tab {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .status-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── TYPE TABS ── */
    .type-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 16px;
      padding-bottom: 2px;
    }

    .type-tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── GENRE PILLS ── */
    .genre-pills-wrap {
      padding: 0 16px 16px;
    }

    #genre-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .genre-pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .genre-pill.active {
      background: rgba(37,99,235,0.2);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .genre-pill:active { transform: scale(0.95); }

    /* ── RESULT HEADER ── */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
    }

    #genre-page-title {
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #genre-page-title::before {
      content: '';
      width: 3px; height: 18px;
      background: var(--accent2);
      border-radius: 2px;
    }

    #result-count {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* ── GRID ── */
    #genre-grid {
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      padding: 16px;
    }

    #load-more {
      width: 100%;
      padding: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      display: none;
      transition: all 0.2s;
    }
    #load-more:active { background: var(--bg3); }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-logo" onclick="window.location.href='/'">ani<span>stream</span></div>
    <div class="topnav-actions">
      <a href="/search" class="icon-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>
    </div>
  </nav>

  <!-- STATUS FILTER -->
  <div class="filter-section">
    <div class="filter-label">Status</div>
    <div class="status-tabs">
      <button class="status-tab" data-status="ongoing"   onclick="setStatus('ongoing')">🟢 Ongoing</button>
      <button class="status-tab" data-status="completed" onclick="setStatus('completed')">✅ Completed</button>
    </div>

    <div class="filter-label">Tipe</div>
    <div class="type-tabs">
      <button class="type-tab" data-type="TV"          onclick="setType('TV')">TV</button>
      <button class="type-tab" data-type="Movie"       onclick="setType('Movie')">Movie</button>
      <button class="type-tab" data-type="OVA"         onclick="setType('OVA')">OVA</button>
      <button class="type-tab" data-type="Special"     onclick="setType('Special')">Special</button>
      <button class="type-tab" data-type="Live Action" onclick="setType('Live Action')">Live Action</button>
    </div>
  </div>

  <!-- GENRE PILLS -->
  <div class="genre-pills-wrap">
    <div class="filter-label" style="margin-bottom:10px">Genre</div>
    <div id="genre-chips">
      <!-- Diisi JS -->
    </div>
  </div>

  <!-- RESULT HEADER -->
  <div class="result-header">
    <div id="genre-page-title">Semua Anime</div>
    <div id="result-count"></div>
  </div>

  <!-- GRID -->
  <div id="genre-grid">
    <!-- Diisi JS -->
  </div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button id="load-more">Muat Lebih Banyak</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" id="nav-home" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      Beranda
    </div>
    <div class="nav-item active" id="nav-genre" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Genre
    </div>
    <div class="nav-item" id="nav-schedule" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Jadwal
    </div>
    <div class="nav-item" id="nav-saved" onclick="showToast('Login dulu untuk menyimpan!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Tersimpan
    </div>
    <div class="nav-item" id="nav-other" onclick="showToast('Fitur segera hadir!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Lainnya
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg) {
      let t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
  <script src="/js/genre.js"></script>
</body>
</html>
