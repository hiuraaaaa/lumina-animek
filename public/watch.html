<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Watch — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { background: #000; }

    /* ── TOP NAV ── */
    .watch-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .watch-nav-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── LOADING ── */
    #watch-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 56px);
      gap: 16px;
      color: var(--text3);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg3);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── VIDEO PLAYER ── */
    .video-wrap {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
    }

    #video-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #no-video {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── STREAM TABS ── */
    .stream-section {
      padding: 14px 16px 0;
    }

    .stream-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    #stream-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .stream-tab {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .stream-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .stream-tab:active { transform: scale(0.96); }

    /* ── EPISODE TITLE ── */
    .ep-title-section {
      padding: 14px 16px 0;
    }

    #watch-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
    }

    .watch-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* ── NOTICE ── */
    .watch-notice {
      margin: 14px 16px 0;
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text2);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .watch-notice svg { flex-shrink: 0; color: var(--accent2); margin-top: 1px; }

    /* ── DOWNLOAD SECTION ── */
    #download-section {
      padding: 20px 16px;
    }

    .dl-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dl-section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--accent2);
      border-radius: 2px;
    }

    .dl-group {
      margin-bottom: 14px;
    }

    .dl-res {
      font-size: 11px;
      font-weight: 800;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .dl-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      text-decoration: none;
      transition: all 0.2s;
    }

    .dl-btn:active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="watch-nav">
    <a id="back-btn" href="/" class="icon-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="15,18 9,12 15,6"/>
      </svg>
    </a>
    <div class="watch-nav-title" id="watch-title-nav">Memuat...</div>
    <a href="/" class="topnav-logo" style="font-size:16px">ani<span>stream</span></a>
  </nav>

  <!-- LOADING -->
  <div id="watch-loading">
    <div class="spinner"></div>
    <span>Memuat episode...</span>
  </div>

  <!-- CONTENT -->
  <div id="watch-content" style="display:none; padding-bottom: calc(var(--bottom-nav) + 16px);">

    <!-- VIDEO PLAYER -->
    <div class="video-wrap">
      <iframe id="video-iframe"
              allowfullscreen
              allow="autoplay; fullscreen"
              referrerpolicy="no-referrer"
              src="about:blank">
      </iframe>
      <div id="no-video">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <polygon points="5,3 19,12 5,21"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <span>Stream tidak tersedia</span>
      </div>
    </div>

    <!-- EPISODE TITLE -->
    <div class="ep-title-section">
      <div id="watch-title">–</div>
      <div class="watch-hint">Pilih server di bawah jika video tidak bisa diputar</div>
    </div>

    <!-- STREAM TABS -->
    <div class="stream-section">
      <div class="stream-label">Pilih Server</div>
      <div id="stream-tabs">
        <!-- Diisi JS -->
      </div>
    </div>

    <!-- NOTICE -->
    <div class="watch-notice">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Jika video tidak muncul, coba ganti server lain atau nonaktifkan ad-blocker.</span>
    </div>

    <!-- DOWNLOAD -->
    <div id="download-section">
      <div class="dl-section-title">Download</div>
      <div id="download-list">
        <!-- Diisi JS -->
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" id="nav-home" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      Beranda
    </div>
    <div class="nav-item" id="nav-genre" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Genre
    </div>
    <div class="nav-item" id="nav-schedule" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Jadwal
    </div>
    <div class="nav-item" id="nav-saved" onclick="showToast('Login dulu untuk menyimpan!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Tersimpan
    </div>
    <div class="nav-item" id="nav-other" onclick="showToast('Fitur segera hadir!')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Lainnya
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg) {
      let t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
  <script src="/js/watch.js"></script>
  <script>
    // Sync nav title with watch title
    const observer = new MutationObserver(() => {
      const title    = document.getElementById('watch-title');
      const navTitle = document.getElementById('watch-title-nav');
      if (title && navTitle) navTitle.textContent = title.textContent;
    });
    const titleEl = document.getElementById('watch-title');
    if (titleEl) observer.observe(titleEl, { childList: true, subtree: true, characterData: true });
  </script>
</body>
</html>
