<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Nonton — AniStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── NO SELECT ── */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    body { background: #000; }

    /* ── PLAYER ── */
    .player-wrap {
      position: relative; width: 100%;
      background: #000; aspect-ratio: 16/9;
    }
    #iframe-player { width:100%; height:100%; border:none; display:none; }
    #video-player  { width:100%; height:100%; background:#000; display:none; }
    .player-loading {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:#000; z-index:5;
    }
    .player-loading .spinner {
      width:36px; height:36px;
      border:2.5px solid rgba(255,255,255,0.08);
      border-top-color:var(--accent2);
      border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    .player-error {
      position:absolute; inset:0;
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:12px; background:#000; z-index:5;
      text-align:center; padding:24px;
    }
    .player-error p {
      font-size:12px; color:var(--text3);
      font-family:'Syne', sans-serif;
      line-height:1.6;
    }
    .btn-try-other {
      padding:9px 22px; background:var(--accent); color:white;
      border:none; border-radius:0;
      font-family:'Syne', sans-serif;
      font-size:11px; font-weight:800;
      letter-spacing:0.8px; text-transform:uppercase;
      cursor:pointer; transition:all 0.15s;
    }
    .btn-try-other:active { background:#1d4ed8; }

    /* ── EP INFO ── */
    .ep-info-bar {
      background:var(--bg2);
      padding:13px 16px;
      border-bottom:1px solid var(--border);
    }
    .ep-info-title {
      font-family:'Syne', sans-serif;
      font-size:13px; font-weight:800;
      line-height:1.3; letter-spacing:-0.2px;
    }
    .ep-info-sub {
      font-size:10px; color:var(--text3);
      margin-top:3px;
      font-family:'Syne', sans-serif;
    }

    /* ── SERVER TABS ── */
    .server-section { padding:14px 16px 0; }
    .server-label {
      font-family:'Syne', sans-serif;
      font-size:10px; font-weight:800; color:var(--text3);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
    }
    .server-tabs { display:flex; flex-wrap:wrap; gap:6px; }
    .server-tab {
      padding:7px 14px; border-radius:0;
      font-family:'Syne', sans-serif;
      font-size:11px; font-weight:700; letter-spacing:0.3px;
      background:var(--bg3); border:1px solid var(--border); color:var(--text2);
      cursor:pointer; transition:all 0.15s;
    }
    .server-tab.active {
      background:var(--accent); border-color:var(--accent); color:white;
    }
    .server-tab:active { opacity:0.8; }

    /* ── NAV BUTTONS ── */
    .ep-nav { display:flex; gap:8px; padding:14px 16px; }
    .btn-ep-nav {
      flex:1; padding:12px; background:var(--bg2); border:1px solid var(--border);
      border-radius:0;
      font-family:'Syne', sans-serif;
      font-size:11px; font-weight:800; letter-spacing:0.3px;
      color:var(--text2); cursor:pointer; transition:all 0.15s;
      display:flex; align-items:center; justify-content:center; gap:6px;
      text-transform:uppercase;
    }
    .btn-ep-nav:disabled { opacity:0.25; cursor:not-allowed; }
    .btn-ep-nav:not(:disabled):active { background:var(--bg3); color:var(--text); }

    /* ── DOWNLOAD ── */
    .dl-section { padding:0 16px 16px; }
    .dl-label {
      font-family:'Syne', sans-serif;
      font-size:10px; font-weight:800; color:var(--text3);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
    }
    .dl-group { display:flex; flex-direction:column; gap:12px; }
    .dl-quality { display:flex; flex-direction:column; gap:6px; }
    .dl-quality .dl-label {
      font-family:'Syne', sans-serif;
      font-size:10px; font-weight:700; color:var(--text2);
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0;
    }
    .dl-links { display:flex; flex-wrap:wrap; gap:6px; }
    .btn-dl {
      padding:7px 13px; background:var(--bg2); border:1px solid var(--border);
      border-radius:0;
      font-family:'Syne', sans-serif;
      font-size:10px; font-weight:700; letter-spacing:0.3px;
      color:var(--text2); text-decoration:none;
      transition:all 0.15s; display:flex; align-items:center; gap:5px;
    }
    .btn-dl:active { background:var(--bg3); color:var(--text); }

    /* ── EPISODE LAINNYA ── */
    .rel-section { padding:0 16px 80px; }
    .rel-label {
      font-family:'Syne', sans-serif;
      font-size:10px; font-weight:800; color:var(--text3);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
    }
    .rel-list { display:flex; flex-direction:column; gap:1px; }
    .rel-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 14px; background:var(--bg2);
      border-bottom:1px solid var(--border);
      border-left:2px solid transparent;
      cursor:pointer; transition:all 0.15s;
      font-family:'Syne', sans-serif;
      font-size:12px; font-weight:700;
    }
    .rel-item:first-child { border-top:1px solid var(--border); }
    .rel-item.active {
      background:rgba(37,99,235,0.1);
      border-left-color:var(--accent2);
      color:var(--accent2);
    }
    .rel-item:not(.active):active { background:var(--bg3); border-left-color:var(--border2); }
    .rel-item-num {
      font-size:10px; color:var(--text3);
      font-family:'Syne', sans-serif; font-weight:700;
    }
    .rel-item.active .rel-item-num { color:var(--accent2); opacity:0.7; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav" style="position:relative;background:var(--bg)">
    <button class="icon-btn" id="btn-back" onclick="history.back()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <div class="topnav-logo" onclick="window.location.href='/'">ani<span>stream</span></div>
    <div style="width:38px"></div>
  </nav>

  <!-- PLAYER -->
  <div class="player-wrap">
    <div class="player-loading" id="player-loading"><div class="spinner"></div></div>
    <div class="player-error" id="player-error">
      <svg width="32" height="32" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>Video gagal dimuat.<br>Coba server lain.</p>
      <button class="btn-try-other" onclick="tryNextServer()">Coba Server Lain</button>
    </div>
    <iframe id="iframe-player" allowfullscreen allow="autoplay; fullscreen" onload="window.hideLoading()"></iframe>
    <video  id="video-player"  controls playsinline
            oncanplay="window.hideLoading()"
            onerror="window.tryNextServer()"></video>
  </div>

  <!-- EP INFO -->
  <div class="ep-info-bar">
    <div class="ep-info-title" id="ep-title">Memuat...</div>
    <div class="ep-info-sub"   id="ep-sub"></div>
  </div>

  <!-- SERVER TABS -->
  <div class="server-section">
    <div class="server-label">Pilih Server</div>
    <div class="server-tabs" id="server-tabs">
      <div style="font-size:11px;color:var(--text3);font-family:'Syne',sans-serif">Memuat server...</div>
    </div>
  </div>

  <!-- EP NAVIGATION -->
  <div class="ep-nav">
    <button class="btn-ep-nav" id="btn-prev" disabled>
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      Sebelumnya
    </button>
    <button class="btn-ep-nav" id="btn-next" disabled>
      Selanjutnya
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
    </button>
  </div>

  <!-- DOWNLOAD -->
  <div class="dl-section">
    <div class="dl-label">Unduh Episode</div>
    <div class="dl-group" id="dl-group">
      <span style="font-size:11px;color:var(--text3);font-family:'Syne',sans-serif">Memuat link...</span>
    </div>
  </div>

  <!-- EPISODE LAINNYA -->
  <div class="rel-section" id="rel-section" style="display:none">
    <div class="rel-label">Episode Lainnya</div>
    <div class="rel-list" id="rel-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/genre'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genre</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/schedule'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Jadwal</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/watchlist'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Tersimpan</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/profile'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profil</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/watch.js"></script>
</body>
</html>
